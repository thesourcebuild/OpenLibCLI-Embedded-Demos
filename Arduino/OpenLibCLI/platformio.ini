; PlatformIO project template for OpenLibCLI
;
; Build this folder directly as a PlatformIO project, or copy the file into a
; demo workspace and point `lib_extra_dirs` at the library location.
;
; Please visit documentation for the other options and examples
; http://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32dev

[env]
framework = arduino
monitor_speed = 9600
lib_ldf_mode = deep
build_flags =
    -DCLI_MAX_HISTORY=3
    -DCLI_MAX_INPUT_LEN=96
    -DCLI_ENABLE_HISTORY=1
    -DCLI_ENABLE_TAB_COMPLETION=1

; ATMEL AVR boards --------------------------------------------------------
[env:uno]
platform = atmelavr
board = uno
build_flags =
    ${env.build_flags}
    -DCLI_MAX_COMMANDS=10
    -DCLI_MAX_HISTORY=3
    -DCLI_MAX_INPUT_LEN=48

; ESP boards --------------------------------------------------------------
[env:esp8266]
platform = espressif8266
board = nodemcu

[env:nodemcu]
platform = espressif8266
board = nodemcu
monitor_filters = direct

[env:esp-01]
platform = espressif8266
board = esp01
upload_resetmethod = nodemcu
monitor_filters = direct

[env:esp-01s]
platform = espressif8266
board = esp01_1m
upload_resetmethod = nodemcu
monitor_filters = direct

[env:esp32dev]
platform = espressif32
board = esp32dev
monitor_filters = esp32_exception_decoder

[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
monitor_filters = esp32_exception_decoder
 
; Raspberry Pi PICO boards -----------------------------------------------
[env:pico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = pico
framework = arduino
board_build.core = earlephilhower
monitor_filters = direct

; STM32 boards ------------------------------------------------------------
[env:nucleo_f103rb]
platform = ststm32
board = nucleo_f103rb
monitor_filters = direct

